name: Bug report
description: Reporte um problema na extensao ou no repositorio
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: O que aconteceu?
      placeholder: Descreva o erro de forma objetiva.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Como reproduzir o problema?
      placeholder: |
        1. Abra...
        2. Clique em...
        3. Veja o erro...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      placeholder: O que deveria acontecer?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Navegador, prints, URL de exemplo e qualquer detalhe util.
