name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate manifest
        shell: pwsh
        run: |
          $manifest = Get-Content manifest.json | ConvertFrom-Json
          if (-not $manifest.name) { throw "manifest.name ausente" }
          if (-not $manifest.version) { throw "manifest.version ausente" }
          if (-not $manifest.action.default_popup) { throw "default_popup ausente" }

      - name: Build extension package
        shell: pwsh
        run: ./scripts/package-extension.ps1

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: imposto-brasil-extensao-dist
          path: dist/imposto-brasil-chrome-web-store.zip
          if-no-files-found: error
